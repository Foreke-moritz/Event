<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Control - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .timeline { border-left: 2px solid var(--border-color); padding-left: 1.5rem; margin-top: 1rem; position: relative; }
        .timeline-item { margin-bottom: 1.5rem; position: relative; }
        .timeline-item::before { content: ""; position: absolute; left: -1.85rem; top: 0.2rem; width: 12px; height: 12px; background: var(--primary-color); border-radius: 50%; box-shadow: 0 0 0 4px var(--card-bg); }
        .timeline-item.in::before { background: var(--success); }
        .timeline-item.out::before { background: var(--danger); }
        .timeline-item.adj::before { background: var(--warning); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-store"></i> <span id="sidebarBizName">CoreInventory</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="products.html" class="nav-item"><i class="fa-solid fa-box-open"></i> Products</a>
                <a href="categories.html" class="nav-item"><i class="fa-solid fa-tags"></i> Categories</a>
                <a href="stock.html" class="nav-item active"><i class="fa-solid fa-boxes-stacked"></i> Stock Management</a>
                <a href="sales.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i> Sales</a>
                <a href="reports.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Reports</a>
                <a href="users.html" class="nav-item"><i class="fa-solid fa-users"></i> Staff Users</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
                <a href="#" onclick="handleLogout()" class="nav-item" style="color: var(--danger); margin-top: 2rem;"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-center gap-3">
                    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
                    <h2 class="page-title">Stock Ledger & Adjustments</h2>
                </div>
            </header>

            <div class="content-area dashboard-grid">
                
                <!-- Explicit Adjustment Form -->
                <div class="card" style="align-self: flex-start;">
                    <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-right-left"></i> Record Stock Movement</h3>
                    
                    <form id="stockForm">
                        <div class="form-group">
                            <label class="form-label">Select Product <span style="color:red">*</span></label>
                            <select id="sProduct" class="form-control" required></select>
                        </div>

                        <div class="form-group">
                            <div class="d-flex justify-between" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; display:none;" id="qtyInfoBox">
                                <span>Current Quantity:</span> <span id="currentQtyDisplay" style="font-weight: 700; color: var(--primary-color);">0</span>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <div class="form-group" style="flex:1;">
                                <label class="form-label">Movement Type <span style="color:red">*</span></label>
                                <select id="sType" class="form-control" required>
                                    <option value="stock_in">Stock IN (Addition)</option>
                                    <option value="stock_out">Stock OUT (General)</option>
                                    <option value="damage">Damage (Loss)</option>
                                    <option value="return">Returned (Addition)</option>
                                    <option value="adjustment">Adjustment (Correction)</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label class="form-label">Quantity <span style="color:red">*</span></label>
                                <input type="number" id="sQty" class="form-control" required min="1">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Adjustment Reason / Notes</label>
                            <textarea id="sNote" class="form-control" rows="3" placeholder="e.g. Received new shipment from supplier..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" id="btnStockSave" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                            Execute Transfer Log
                        </button>
                    </form>
                </div>

                <!-- Live Ledger Display -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-clock-rotate-left"></i> Movement History Ledger</h3>
                    <div class="timeline" id="stockLedger">
                        <div style="text-align: center; color: var(--text-muted);"><span class="spinner"></span> Parsing global ledgers...</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/route-guard.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin-stock.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('show');
        });
    </script>
</body>
</html>
